# ============================================================
# SHAHEEN-YS — Nginx Reverse Proxy Configuration
#
# Routing table
# ─────────────────────────────────────────────────────────────
#   /               → Django ASGI backend (port 8000)
#   /static/        → Django staticfiles (volume mount)
#   /vscode/        → OpenVSCode Server (port 3000)
#   /gitea/         → Gitea self-hosted Git (port 3001)
#   /openhands/     → OpenHands AI agent (port 3000)
#   /continue/      → Continue AI config server (port 8080)
# ============================================================

# ── Upstream definitions ─────────────────────────────────────
upstream django {
    server django:8000;
    keepalive 64;
}

upstream vscode {
    server vscode:3000;
}

upstream gitea {
    server gitea:3001;
}

# upstream openhands is defined only when the "ai" profile is active.
# Uncomment the block below and run: docker compose --profile ai up -d openhands
# upstream openhands {
#     server openhands:3000;
# }

upstream continue_ai {
    server continue:8080;
}

# ── HTTP server ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Maximum upload size (adjust for large file uploads)
    client_max_body_size 100M;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Health check endpoint ────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'SHAHEEN-YS OK\n';
    }

    # ── Django static files (served directly by Nginx) ───────
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── OpenVSCode Server ─────────────────────────────────────
    # WebSocket upgrade is required for the terminal and editor protocol.
    location /vscode/ {
        proxy_pass         http://vscode/;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;    # keep WS connections alive
        proxy_send_timeout 86400s;
    }

    # ── Gitea ─────────────────────────────────────────────────
    location /gitea/ {
        proxy_pass         http://gitea/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for Gitea's redirect handling
        proxy_redirect http://gitea/ /gitea/;
    }

    # ── OpenHands AI agent (disabled — requires --profile ai) ────
    # Uncomment after: docker compose --profile ai up -d openhands
    # AND un-comment the upstream openhands block at the top.
    # location /openhands/ {
    #     proxy_pass         http://openhands/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade    $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 3600s;
    #     proxy_send_timeout 3600s;
    # }

    # ── Continue AI config server ─────────────────────────────
    location /continue/ {
        proxy_pass         http://continue_ai/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django ASGI — WebSocket (Channels) ───────────────────
    location /ws/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Django — all other traffic ────────────────────────────
    location / {
        proxy_pass         http://django;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffer settings for large API responses
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/shaheen_access.log;
    error_log  /var/log/nginx/shaheen_error.log warn;
}
